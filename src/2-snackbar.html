<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snackbar | JS Web App</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <load src="./partials/header.html" icon-path="./img/sprite.svg#logo" highlight-curr="active" />

  <main>
    <div class="container">
      <h1 class="main-title">
        <span class="main-title-gradient">Promise</span> Generator
      </h1>

      <form class="form">
        <label class="form-label">
          Delay (ms)
          <input type="number" name="delay" min="0" required />
        </label>

        <fieldset class="form-fieldset">
          <legend>State</legend>
          <div class="radio-group">
            <label class="text-radio">
              <input type="radio" name="state" value="fulfilled" required />
              Fulfilled
            </label>
            <label class="text-radio">
              <input type="radio" name="state" value="rejected" required />
              Rejected
            </label>
          </div>
        </fieldset>

        <button type="submit" class="submit-btn">Create notification</button>
      </form>

      <load src="./partials/back-link.html" />
    </div>
  </main>

  <load src="./partials/footer.html" />
  <script type="module" src="./js/2-snackbar.js"></script>
</body>

</html>
